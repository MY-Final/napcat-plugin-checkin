<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
        }
        .card {
            width: 600px;
            height: 380px;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
        }
        .glow {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 228, 233, 0.6) 0%, rgba(255, 255, 255, 0) 70%);
        }
        .sidebar {
            position: absolute;
            left: 0;
            top: 140px;
            width: 5px;
            height: 80px;
            background: #fb7185;
            border-radius: 0 3px 3px 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            padding: 35px 40px 0 40px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .nickname {
            font-size: 20px;
            font-weight: bold;
            color: #18181b;
        }
        .qq {
            font-size: 13px;
            color: #71717a;
        }
        .rank-number {
            font-size: 28px;
            font-weight: bold;
            color: #f43f5e;
            font-style: italic;
        }
        .rank-label {
            font-size: 11px;
            color: #a1a1aa;
            font-weight: 600;
        }
        .points {
            text-align: center;
            font-size: 88px;
            font-weight: bold;
            background: linear-gradient(180deg, #f43f5e 0%, #be185d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }
        .points-label {
            text-align: center;
            font-size: 14px;
            color: #fda4af;
            font-weight: bold;
            letter-spacing: 4px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 40px 0 40px;
            padding: 15px 0;
            background: #fff1f2;
            border-radius: 20px;
        }
        .stat-item { text-align: center; }
        .stat-label {
            font-size: 12px;
            color: #e11d48;
            font-weight: 600;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #4d1a2a;
        }
        .footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
        }
        .date { font-size: 12px; color: #a1a1aa; }
        .quote {
            font-size: 12px;
            color: #d4d4d8;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="glow"></div>
    <div class="sidebar"></div>
    <div class="header">
        <div class="user-info">
            <img class="avatar" src="{{avatarUrl}}" alt="avatar">
            <div>
                <div class="nickname">{{nickname}}</div>
                <div class="qq">QQ: {{userId}}</div>
            </div>
        </div>
        <div style="text-align: right;">
            <div class="rank-number">#{{todayRank}}</div>
            <div class="rank-label">TODAY RANK</div>
        </div>
    </div>
    <div class="points">+{{earnedPoints}}</div>
    <div class="points-label">POINTS EARNED</div>
    <div class="stats">
        <div class="stat-item">
            <div class="stat-label">累计天数</div>
            <div class="stat-value">{{totalDays}} 天</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">累计积分</div>
            <div class="stat-value">{{totalPoints}} 分</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">签到时间</div>
            <div class="stat-value">{{checkinTime}}</div>
        </div>
    </div>
    <div class="footer">
        <div class="date">{{currentDate}}</div>
        <div class="quote">"{{quote}}"</div>
    </div>
</div>
</body>
</html>
