<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f5f9;
            font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 30px 60px -12px rgba(244, 63, 94, 0.18);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 820px;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(254, 226, 226, 0.6) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
        }
        .group-header {
            position: relative;
            z-index: 1;
            padding: 35px 30px 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .group-left { display: flex; align-items: center; gap: 14px; }
        .group-avatar {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f43f5e, #be185d);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(244, 63, 94, 0.25);
            font-size: 20px;
        }
        .group-info h2 { font-size: 19px; color: #18181b; font-weight: 800; }
        .group-id { font-size: 12px; color: #a1a1aa; margin-top: 2px; }
        .update-tag {
            background: #fef2f2;
            color: #ef4444;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
        }
        .leaderboard-list {
            position: relative;
            z-index: 1;
            flex: 1;
            overflow-y: auto;
            padding: 0 25px;
            padding-bottom: 130px;
            scrollbar-width: none;
        }
        .leaderboard-list::-webkit-scrollbar { display: none; }
        .user-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px 8px;
            border-radius: 20px;
            transition: background 0.3s ease;
        }
        .user-row:active { background: #fff1f2; }
        .rank-badge {
            width: 30px;
            font-weight: 900;
            font-size: 15px;
            color: #d1d5db;
            text-align: center;
            font-family: 'Arial Black', sans-serif;
        }
        .rank-1 .rank-badge { color: #f59e0b; font-size: 20px; }
        .rank-2 .rank-badge { color: #94a3b8; }
        .rank-3 .rank-badge { color: #b45309; }
        .avatar-wrapper { position: relative; }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 15px;
            object-fit: cover;
            background: #f8fafc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .rank-1 .avatar-wrapper::after {
            content: '👑';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }
        .info-content { flex: 1; }
        .user-meta { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .username { font-size: 15px; font-weight: 700; color: #334155; }
        .points-val { font-size: 14px; font-weight: 800; color: #0f172a; }
        .bar-container {
            width: 100%;
            height: 8px;
            background: #f1f5f9;
            border-radius: 12px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 12px;
            background: linear-gradient(90deg, #f43f5e, #fb7185);
            position: relative;
        }
        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite linear;
        }
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .rank-1 .bar-fill { background: linear-gradient(90deg, #be185d, #f43f5e); }
        .rank-2 .bar-fill { background: linear-gradient(90deg, #fb7185, #fda4af); }
        .my-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 18px 24px;
            border-radius: 28px;
            box-shadow: 0 15px 30px rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        .my-rank-tag {
            background: #18181b;
            color: #fff;
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 11px;
        }
        .my-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            border: 2px solid #f43f5e;
            padding: 2px;
        }
        .my-info { flex: 1; }
        .my-name { font-weight: 800; font-size: 16px; color: #18181b; }
        .my-id { font-size: 12px; color: #94a3b8; font-family: monospace; }
        .my-points-val { font-weight: 900; color: #f43f5e; font-size: 22px; line-height: 1; }
        .my-points-label { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; display: block; margin-top: 4px;}
    </style>
</head>
<body>
<div class="container">
    <div class="group-header">
        <div class="group-left">
            <div class="group-avatar">GP</div>
            <div class="group-info">
                <h2>{{typeName}}</h2>
                <div class="group-id"># {{groupId}}</div>
            </div>
        </div>
        <div class="update-tag">LIVE</div>
    </div>
    <div class="leaderboard-list">
        {{usersHtml}}
    </div>
    {{myRankHtml}}
</div>
</body>
</html>
